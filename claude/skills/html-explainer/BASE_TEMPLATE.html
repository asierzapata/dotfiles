<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>{{Topic}} — explainer</title>
		<style>
			:root {
				/* Edpuzzle palette (ui/identity/colors.scss) */
				--white: #ffffff;
				--soymilk: #fcfbfa;
				--frost: #eef5fa;
				--sky: #ebf4fd;
				--sky-light: #f5f9fe;
				--martens: #333333;
				--gunmetal-1: #434649;
				--gunmetal-2: #73777d;
				--gunmetal-3: #c0c4c8;
				--gunmetal-4: #d9dde0;
				--gunmetal-5: #f1f1f2;
				--gunmetal-6: #fafafa;
				--pool: #0c70eb;
				--pool-light: #deebff;
				--pool-deep: #0a4388;
				--orangina: #ff9900;
				--orangina-light: #fbe2bc;
				--orangina-deep: #d26312;
				--bananas: #ffc400;
				--bananas-light: #fff4d3;
				--coral: #d13a40;
				--coral-light: #fdeded;
				--golf: #0da07d;
				--golf-light: #e5f4f4;
				--golf-deep: #036951;
				--verbena: #ecdcfa;
				--verbena-deep: #a458e5;

				/* Semantic */
				--bg: var(--soymilk);
				--panel: var(--white);
				--panel-2: var(--gunmetal-6);
				--border: var(--gunmetal-4);
				--text: var(--martens);
				--muted: var(--gunmetal-2);
				--accent: var(--pool);
				--accent-soft: var(--pool-light);

				/* Default section accent (overridden by [data-accent] on body or section) */
				--layer-accent: var(--pool);
				--layer-soft: var(--pool-light);

				/* 4px unit grid */
				--u1: 4px;  --u2: 8px;  --u3: 12px; --u4: 16px;
				--u5: 20px; --u6: 24px; --u8: 32px; --u10: 40px;
				--u12: 48px; --u16: 64px;

				/* Radii */
				--r-sm: 4px;  --r-md: 8px;  --r-lg: 12px;
				--r-xl: 16px; --r-pill: 9999px;

				--shadow-sm: 0 1px 2px rgba(51,51,51,0.06), 0 1px 1px rgba(51,51,51,0.04);
				--shadow-md: 0 4px 12px rgba(51,51,51,0.08), 0 1px 2px rgba(51,51,51,0.04);

				--sans: 'GT Pressura', Helvetica, Arial, sans-serif;
				--mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
			}

			/* Section accent system — set via data-accent on <body> or a parent element */
			[data-accent='pool']     { --layer-accent: var(--pool);          --layer-soft: var(--pool-light); }
			[data-accent='orangina'] { --layer-accent: var(--orangina-deep); --layer-soft: var(--orangina-light); }
			[data-accent='verbena']  { --layer-accent: var(--verbena-deep);  --layer-soft: var(--verbena); }
			[data-accent='golf']     { --layer-accent: var(--golf);          --layer-soft: var(--golf-light); }
			[data-accent='coral']    { --layer-accent: var(--coral);         --layer-soft: var(--coral-light); }
			[data-accent='bananas']  { --layer-accent: var(--bananas);       --layer-soft: var(--bananas-light); }

			* { box-sizing: border-box; }
			html, body {
				margin: 0; padding: 0;
				background: var(--bg);
				color: var(--text);
				font-family: var(--sans);
				line-height: 1.5;
				-webkit-font-smoothing: antialiased;
			}

			/* Typography */
			h1 { font-size: 34px; font-weight: 600; margin: 0 0 var(--u3); line-height: 1.15; letter-spacing: -0.5px; }
			h2 { font-size: 22px; font-weight: 600; margin: var(--u10) 0 var(--u3); letter-spacing: -0.2px; }
			h3 { font-size: 15px; font-weight: 600; margin: var(--u6) 0 var(--u2); color: var(--text); }
			p { margin: 0 0 var(--u4); }
			.lede { color: var(--gunmetal-1); font-size: 18px; max-width: 720px; margin: 0 0 var(--u10); line-height: 1.55; }
			.lede strong { color: var(--text); font-weight: 600; }
			.eyebrow {
				display: inline-flex; align-items: center; gap: var(--u2);
				color: var(--layer-accent);
				background: var(--layer-soft);
				font-family: var(--mono); font-size: 11px;
				letter-spacing: 0.08em; text-transform: uppercase; font-weight: 600;
				padding: var(--u1) var(--u3);
				border-radius: var(--r-pill);
				margin-bottom: var(--u4);
			}
			code, .mono { font-family: var(--mono); font-size: 0.88em; }
			code {
				background: var(--gunmetal-5); color: var(--gunmetal-1);
				border: 1px solid var(--gunmetal-4);
				padding: 1px 6px; border-radius: var(--r-sm);
			}
			.brand { font-weight: 600; letter-spacing: -0.2px; font-size: 15px; }
			.brand .dot { color: var(--layer-accent); transition: color 0.2s ease; }
		</style>
	</head>
	<body>
		<!--
			This is a BASE template. It ships with:
			  - Design tokens (palette, spacing, radii, typography)
			  - Section accent system via [data-accent="..."]
			  - Base typography (h1, h2, h3, p, .lede, .eyebrow, code, .brand)

			It does NOT ship with:
			  - A navigation pattern — pick one from NAVIGATION_PATTERNS.md and drop in its HTML+CSS+JS
			  - A section structure — sections can be tabbed, scrolling, accordion, etc.
			  - Component CSS for diagrams, callouts, code blocks, tables — copy from the
			    "Component Library" section of REFERENCE.md and append to the <style> block above

			Typical assembly:
			  1. Open this file
			  2. Append component CSS you need (from REFERENCE.md) into the <style> block
			  3. Drop in a navigation pattern from NAVIGATION_PATTERNS.md
			  4. Fill sections one at a time
		-->
	</body>
</html>
